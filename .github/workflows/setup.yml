name: Update deploy buttons

on:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Не запускать на оригинальном шаблоне — только на копиях пользователей
    if: github.repository != 'alexzah-droid/astro-portfolio-template'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace repo references in README
        run: |
          sed -i 's|alexzah-droid/astro-portfolio-template|${{ github.repository }}|g' README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes, skipping commit" || (
            git commit -m "chore: update deploy button URLs for this repository"
            git push
          )
